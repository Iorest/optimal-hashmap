name: Bug Report
description: Report a correctness or crash bug in ooh::flat_map
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!
        Please fill in as much detail as possible to help us reproduce and fix the issue.

  - type: input
    id: version
    attributes:
      label: ooh version
      placeholder: e.g. v1.0.0 or commit SHA
    validations:
      required: true

  - type: dropdown
    id: compiler
    attributes:
      label: Compiler
      options:
        - GCC 11+
        - Clang 14+
        - MSVC 2019+
        - Apple Clang
        - Other (describe below)
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: e.g. Ubuntu 22.04 / macOS 14 / Windows 11
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: What went wrong? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimal reproducer
      description: A self-contained C++ snippet that demonstrates the bug.
      render: cpp
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Stack traces, sanitizer output, etc.
