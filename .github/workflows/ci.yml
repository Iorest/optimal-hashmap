name: CI

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Linux: GCC & Clang, Debug + Release, ASan ──────────────────────────────
  linux:
    name: Linux ${{ matrix.compiler }} ${{ matrix.build_type }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc-13
            cc: gcc-13
            cxx: g++-13
            build_type: Debug
            asan: ON
          - compiler: gcc-13
            cc: gcc-13
            cxx: g++-13
            build_type: Release
            asan: OFF
          - compiler: clang-18
            cc: clang-18
            cxx: clang++-18
            build_type: Debug
            asan: ON
          - compiler: clang-18
            cc: clang-18
            cxx: clang++-18
            build_type: Release
            asan: OFF

    steps:
      - uses: actions/checkout@v4

      - name: Install compiler
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ${{ matrix.compiler }} ninja-build

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DOOH_BUILD_TESTS=ON \
            -DOOH_BUILD_BENCH=OFF \
            -DOOH_ENABLE_ASAN=${{ matrix.asan }}

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build -V --output-on-failure

  # ── Linux: Coverage (GCC Debug) ─────────────────────────────────────────────
  coverage:
    name: Coverage (GCC)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc-13 g++-13 ninja-build lcov

      - name: Configure
        env:
          CC: gcc-13
          CXX: g++-13
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DOOH_BUILD_TESTS=ON \
            -DOOH_ENABLE_ASAN=OFF \
            -DOOH_ENABLE_COVERAGE=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build -V --output-on-failure

      - name: Collect coverage
        run: |
          lcov --capture \
               --directory build \
               --output-file coverage.info \
               --gcov-tool gcov-13 \
               --ignore-errors mismatch
          lcov --remove coverage.info \
               '/usr/*' '*/tests/*' \
               --output-file coverage_filtered.info
          lcov --summary coverage_filtered.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage_filtered.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ── macOS: Apple Clang & GCC ─────────────────────────────────────────────────
  macos:
    name: macOS ${{ matrix.compiler }} ${{ matrix.build_type }}
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: apple-clang
            cc: clang
            cxx: clang++
            build_type: Release
          - compiler: gcc-14
            cc: gcc-14
            cxx: g++-14
            build_type: Release

    steps:
      - uses: actions/checkout@v4

      - name: Install GCC (if needed)
        if: matrix.compiler == 'gcc-14'
        run: brew install gcc@14

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DOOH_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build -V --output-on-failure

  # ── Windows: MSVC & Clang-cl ─────────────────────────────────────────────────
  windows:
    name: Windows ${{ matrix.toolset }} ${{ matrix.build_type }}
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        include:
          - toolset: msvc
            build_type: Debug
          - toolset: msvc
            build_type: Release
          - toolset: clang-cl
            build_type: Release

    steps:
      - uses: actions/checkout@v4

      - name: Configure (MSVC)
        if: matrix.toolset == 'msvc'
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} `
            -DOOH_BUILD_TESTS=ON

      - name: Configure (clang-cl)
        if: matrix.toolset == 'clang-cl'
        run: |
          cmake -B build `
            -T ClangCL `
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} `
            -DOOH_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Test
        run: ctest --test-dir build -C ${{ matrix.build_type }} -V --output-on-failure

  # ── C++ Standards: 17 / 20 / 23 ─────────────────────────────────────────────
  cxx_standards:
    name: C++${{ matrix.std }} (GCC)
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        std: [17, 20, 23]
    steps:
      - uses: actions/checkout@v4

      - name: Install
        run: sudo apt-get update -qq && sudo apt-get install -y gcc-13 g++-13 ninja-build

      - name: Configure
        env:
          CC: gcc-13
          CXX: g++-13
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=${{ matrix.std }} \
            -DOOH_BUILD_TESTS=ON

      - name: Build & Test
        run: cmake --build build --parallel && ctest --test-dir build -V --output-on-failure

  # ── Sanitizers: ThreadSanitizer ──────────────────────────────────────────────
  tsan:
    name: ThreadSanitizer
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install
        run: sudo apt-get update -qq && sudo apt-get install -y clang-18 ninja-build

      - name: Configure
        env:
          CC: clang-18
          CXX: clang++-18
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DOOH_BUILD_TESTS=ON \
            -DOOH_ENABLE_TSAN=ON

      - name: Build & Test
        run: cmake --build build --parallel && ctest --test-dir build -V --output-on-failure

  # ── Static analysis: clang-tidy ─────────────────────────────────────────────
  clang_tidy:
    name: clang-tidy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install
        run: sudo apt-get update -qq && sudo apt-get install -y clang-18 clang-tidy-18 ninja-build

      - name: Configure
        env:
          CC: clang-18
          CXX: clang++-18
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DOOH_BUILD_TESTS=ON

      - name: Build (generate compile_commands.json)
        run: cmake --build build --parallel

      - name: Run clang-tidy
        run: |
          clang-tidy-18 \
            -p build \
            --config-file=.clang-tidy \
            include/ooh/flat_map.hpp \
            tests/test_flat_map.cpp \
            2>&1 | tee clang_tidy_report.txt
          # Fail if errors found (warnings allowed)
          ! grep -q "error:" clang_tidy_report.txt

  # ── All jobs pass gate ───────────────────────────────────────────────────────
  all_pass:
    name: All CI checks passed
    runs-on: ubuntu-latest
    needs: [linux, coverage, macos, windows, cxx_standards, tsan, clang_tidy]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All jobs passed"
